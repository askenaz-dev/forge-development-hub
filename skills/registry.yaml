schema_version: 2
hub_version: "2026.05"

components:
  # --- skills --------------------------------------------------------------
  - name: design-system
    kind: skill
    description: Forge design system rules, tokens, and component catalog for any UI work.
    owner_team: design-platform
    tags: [ui, react, tailwind, accessibility, design-tokens, forge-identity]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/design-system

  # --- rules ---------------------------------------------------------------
  - name: no-console-log
    kind: rule
    description: Prohibits console.log/info/warn/error/debug in committed TS/JS source; use the project's logger instead.
    owner_team: dx-platform
    tags: [typescript, javascript, logging, quality, observability]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: rules/no-console-log

  # --- agents --------------------------------------------------------------
  - name: forge-pr-writer
    kind: agent
    description: Generates pull request descriptions in Forge house style from a git diff or list of changed files.
    owner_team: dx-platform
    tags: [pr, documentation, forge-style, code-review]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code]
    path: agents/forge-pr-writer

  # --- hooks ---------------------------------------------------------------
  - name: doctor-on-session-start
    kind: hook
    description: Runs fdh doctor --quiet at every Claude Code SessionStart to surface drift early.
    owner_team: dx-platform
    tags: [doctor, drift-detection, session-lifecycle]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code]
    path: hooks/doctor-on-session-start

