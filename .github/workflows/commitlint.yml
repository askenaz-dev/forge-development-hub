name: commitlint

# Conventional-Commit enforcement (capability component-versioning-and-release).
#   1. commitlint: message shape + scope-enum (scope, when present, must be a
#      real component or an infra scope) — see commitlint.config.js.
#   2. check-commit-scopes.py: DIFF-aware — a feat/fix touching a component dir
#      MUST carry that component's scope (decision D15).

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - name: Lint PR commit messages
        run: >
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Path-aware scope check (feat/fix ↔ component)
        run: >
          python tools/check-commit-scopes.py
          --base ${{ github.event.pull_request.base.sha }}
          --head ${{ github.event.pull_request.head.sha }}
