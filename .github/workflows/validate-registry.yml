name: validate-registry

# Runs on every PR/push touching the hub catalog, any of the four primitive
# directories, the consumer manifest fixtures, or any of the validators.
# Blocks merge if:
#   - hub/registry.yaml is malformed or inconsistent with the directory trees
#   - hub/profiles.yaml references unknown components or has shape errors
#   - skills/registry.yaml is stale vs hub/registry.yaml (mirror out of date)
#   - any fixture manifest validates wrong (valid ones must pass, invalid ones must fail)
#
# TODO: replace `python tools/...` invocations with `fdh validate-registry`
# and `fdh validate-manifest` once the Go implementation lands in the fdh repo.

on:
  pull_request:
    paths:
      - "hub/**"
      - "skills/**"
      - "rules/**"
      - "agents/**"
      - "hooks/**"
      - "tools/validate-registry.py"
      - "tools/validate-manifest.py"
      - "tools/regenerate-skills-registry-mirror.py"
      - "tools/migrate-registry-v1-v2.py"
      - "tests/**"
      - ".github/workflows/validate-registry.yml"
  push:
    branches: [main]
    paths:
      - "hub/**"
      - "skills/**"
      - "rules/**"
      - "agents/**"
      - "hooks/**"
      - "tools/validate-registry.py"
      - "tools/validate-manifest.py"
      - "tools/regenerate-skills-registry-mirror.py"
      - "tools/migrate-registry-v1-v2.py"
      - "tests/**"
      - ".github/workflows/validate-registry.yml"

jobs:
  validate-registry-and-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6,<7"
      - name: Validate hub/registry.yaml + hub/profiles.yaml + mirror sync
        run: python tools/validate-registry.py

  validate-manifest-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6,<7"
      - name: Valid fixtures MUST pass
        run: |
          set -e
          for f in tests/fixtures/manifests/*-valid.yaml; do
            echo "::group::valid fixture: $f"
            python tools/validate-manifest.py "$f"
            echo "::endgroup::"
          done
      - name: Invalid fixtures MUST fail (exit non-zero)
        run: |
          set -e
          for f in tests/fixtures/manifests/*-invalid.yaml; do
            echo "::group::invalid fixture: $f"
            if python tools/validate-manifest.py "$f"; then
              echo "::error::expected failure but validator returned 0 for $f"
              exit 1
            fi
            echo "OK: validator correctly rejected $f"
            echo "::endgroup::"
          done

  mirror-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6,<7"
      - name: skills/registry.yaml must be in sync with hub/registry.yaml
        # --check exits 1 if stale; CI fails. Authors should run the script
        # locally (without --check) to regenerate.
        run: python tools/regenerate-skills-registry-mirror.py --check

  python-test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6,<7"
      - name: Run all Python unit tests
        run: python -m unittest discover -s tests -v
