# registry.yaml — authoritative catalog of components published by this hub.
#
# Consumed by the `fdh` CLI (`fdh init`, `fdh install`, `fdh update`) via the
# `registry.url` config. Edited by hub admins; validated in CI on every PR.
#
# Top-level fields:
#   schema_version  Integer. Bumped on incompatible shape changes. Adding a new
#                   OPTIONAL field does NOT bump schema_version. Current: 2.
#   hub_version     Free-form release marker for this hub (calver or semver).
#                   Informational only; `fdh` uses the git commit of the hub for
#                   pinning, not this string.
#   components      List of component entries (replaces v1's `skills:` list,
#                   which was kind-specific). Order is informational.
#
# Entry fields (v2):
#   name              Unique within the same `kind`. Kebab-case identifier.
#                     MUST match the directory name under <kind-dir>/<name>/.
#   kind              One of: skill | rule | agent | hook. REQUIRED — no
#                     defaulting to `skill`. Forces conscious decision on add.
#   description       One-line human-readable summary.
#   owner_team        Team responsible for the component. Used for routing
#                     questions and PR reviews.
#   tags              List of strings for discovery/filtering. Free-form.
#   default           true | false. When true, `fdh init` pre-selects this
#                     component in the wizard. Authoritative — any `default`
#                     field in the component's own SKILL.md/RULE.md/AGENT.md/
#                     HOOK.md frontmatter is ignored.
#   min_fdh_version   Minimum `fdh` CLI version (semver) that can install this
#                     component. `fdh init` refuses if its own version is lower.
#   agents_supported  Non-empty list. Subset of:
#                     [claude-code, codex, copilot, opencode].
#                     Agents not listed are excluded when installing.
#   path              Repo-relative path to the component's source directory.
#                     MUST exist. MUST be coherent with `kind`:
#                       kind: skill -> path: skills/<name>
#                       kind: rule  -> path: rules/<name>
#                       kind: agent -> path: agents/<name>
#                       kind: hook  -> path: hooks/<name>
#                     CI validates.

schema_version: 2
hub_version: "2026.05"

components:
  # --- skills --------------------------------------------------------------
  - name: design-system
    kind: skill
    description: Forge design system rules, tokens, and component catalog for any UI work.
    owner_team: design-platform
    tags: [ui, react, tailwind, accessibility, design-tokens, forge-identity]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/design-system

  - name: spec-driven-development
    kind: skill
    description: Drive non-trivial changes through a four-phase spec-driven flow — explore, propose, apply, archive. Use when the user wants to introduce SDD discipline to a team, kick off a new change formally, or align on requirements before any implementation work begins.
    owner_team: dx-platform
    tags: [sdd, openspec, methodology, process]
    default: false
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/spec-driven-development

  - name: tech-stack
    kind: skill
    description: forge's approved technology stack reference plus the code-quality gates every service must pass. Pulls the canonical stack from the platform's authenticated registry and enforces linter + SonarLint conventions. Use when starting a new service, validating a technology choice, or wiring up local quality gates.
    owner_team: dx-platform
    tags: [tech-stack, code-quality, sonarlint, linters]
    default: false
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/tech-stack

  - name: architecture-patterns
    kind: skill
    description: Reference architecture patterns and design principles applied across forge services. Covers service boundaries, data ownership, API design, event-driven patterns, and integration approaches. Use when designing a new system, evaluating an existing one, or arguing for a refactor.
    owner_team: architecture-guild
    tags: [patterns, boundaries, events, api-design]
    default: false
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/architecture-patterns

  - name: devsecops
    kind: skill
    description: Security review + DevSecOps practices for forge services. Covers threat modeling, SAST/DAST gates, dependency + container scanning, secret management via Vault, runtime security, and the shift-left checklist every PR runs through. Use when reviewing security posture, wiring security into a pipeline, or onboarding a new service to the platform.
    owner_team: appsec
    tags: [devsecops, shift-left, threat-modeling, vault]
    default: false
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/devsecops

  - name: landing-zone-deploy
    kind: skill
    description: Stand up a new service on forge's landing zone — five GitLab repos covering infrastructure (Terraform), GitOps (Flux), IAM, networking, and secrets (Vault). Use when bootstrapping a new service from scratch or migrating an existing one onto the landing zone.
    owner_team: platform-engineering
    tags: [landing-zone, gitops, flux, terraform, vault]
    default: false
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: skills/landing-zone-deploy

  # --- rules ---------------------------------------------------------------
  - name: no-console-log
    kind: rule
    description: Prohibits console.log/info/warn/error/debug in committed TS/JS source; use the project's logger instead.
    owner_team: dx-platform
    tags: [typescript, javascript, logging, quality, observability]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code, codex, copilot, opencode]
    path: rules/no-console-log

  # --- agents --------------------------------------------------------------
  - name: forge-pr-writer
    kind: agent
    description: Generates pull request descriptions in Forge house style from a git diff or list of changed files.
    owner_team: dx-platform
    tags: [pr, documentation, forge-style, code-review]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code]
    path: agents/forge-pr-writer

  # --- hooks ---------------------------------------------------------------
  - name: doctor-on-session-start
    kind: hook
    description: Runs fdh doctor --quiet at every Claude Code SessionStart to surface drift early.
    owner_team: dx-platform
    tags: [doctor, drift-detection, session-lifecycle]
    default: true
    min_fdh_version: "0.4.0"
    agents_supported: [claude-code]
    path: hooks/doctor-on-session-start

  # --- Example placeholder for a new component (commented out) -------------
